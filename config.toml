# Ant Simulation Configuration

# Pheromone decay settings
decay_amount = 1       # Amount to decay each tick
max_strength = 1000     # Maximum pheromone strength

# Pheromone deposit settings
deposit_amount = 5                 # Amount of pheromone deposited per ant per tick
deposit_amount_carrying_food = 100  # Amount of pheromone deposited when carrying food

# Visual settings
dot_radius = 0.001      # Radius of pheromone dots in render

# Ant collision settings
collision_radius = 0.0001        # Radius at which ants detect collisions
collision_angle_min = 1.1693706  # ~67 degrees - minimum collision angle
collision_angle_max = 1.9547688  # ~112 degrees - maximum collision angle

# Ant movement randomness
forager_randomness = 0.1   # Randomness factor for forager ants
scout_randomness = 0.1     # Randomness factor for scout ants

# Ant sensor settings (for pheromone following)
sensor_distance = 0.006   # Distance from ant to sense pheromones
sensor_angle = 0.524      # ~30 degrees - angle offset for sensors

# Population settings
n_ants = 15000                           # Number of ants in the simulation
base_speed = 0.0015                      # Base movement speed of ants
homing_strength = 0.1   # Steering strength toward colony when carrying food (0.0 to ~1.0)

# Scout/forager ratio
scout_ratio = 0.2       # Initial ratio of scout ants (0.0 to 1.0)
ratio_step = 0.05        # Step size for adjusting ratio with arrow keys

# Food settings
food_source_radius = 0.001 # Radius of the food source in units, 1 = full screen width

# Window settings in pixels
# window_width = 1980
# window_height = 1200
## Instagram Reel size three thirds
# window_width = 1080
# window_height = 1920
## Large square
window_width = 1200
window_height = 1200

# Color palette (pastel, debug)
palette = "pastel"
